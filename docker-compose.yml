version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    networks:
      - omega_net
    depends_on:
      - api
      - cms

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    expose:
      - "3000"
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - omega_net

  cms:
    build:
      context: .
      dockerfile: ./apps/cms/Dockerfile
    expose:
      - "80"
    networks:
      - omega_net

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: omega
    networks:
      - omega_net

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    networks:
      - omega_net

networks:
  omega_net:
    driver: bridge
    internal: false

volumes:
  postgres_data:
