version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/logs:/var/log/nginx
    networks:
      - omega_net
    depends_on:
      - api
      - cms

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
    expose:
      - "3000"
    env_file:
      - .env.prod
    depends_on:
      - postgres
      - redis
    networks:
      - omega_net
    restart: unless-stopped

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    networks:
      - omega_net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: omega
    networks:
      - omega_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - omega_net
    restart: unless-stopped

networks:
  omega_net:
    driver: bridge
    internal: false

volumes:
  postgres_data:
  redis_data:
